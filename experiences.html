<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Gallery | BanastaoHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; }
        .navbar { background: rgba(0, 31, 63, 0.9); }
        .gallery-container { margin-top: 100px; padding-bottom: 50px; }
        
        /* Filtering Animation */
        .gallery-item { transition: all 0.4s ease; }
        
        .img-card {
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            height: 250px;
            position: relative;
        }
        .img-card img { width: 100%; height: 100%; object-fit: cover; }
        .img-card:hover { transform: scale(1.03); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        /* Label overlay */
        .img-label {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0, 31, 63, 0.7);
            color: white;
            padding: 5px 10px;
            font-size: 0.8rem;
            text-align: center;
        }

        footer { background: #001f3f; color: white; padding: 40px 0; }
        .btn-outline-primary { color: #001f3f; border-color: #001f3f; }
        .btn-outline-primary:hover, .btn-outline-primary.active { background-color: #001f3f; border-color: #001f3f; color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand" href="index.html">BanastaoHub</a>
        <div class="ms-auto">
            <a class="btn btn-sm btn-outline-light" href="index.html">Back to Home</a>
        </div>
    </div>
</nav>

<div class="container gallery-container">
    <h2 class="text-center mb-2 fw-bold">Site-Wide Gallery</h2>
    <p class="text-center text-muted mb-5">A complete collection of all experiences and portfolio artifacts.</p>

    <div class="d-flex justify-content-center flex-wrap gap-2 mb-5">
        <button class="btn btn-outline-primary active" onclick="filterGallery('all')">All Photos</button>
        <button class="btn btn-outline-primary" onclick="filterGallery('base')">Villamor Base</button>
        <button class="btn btn-outline-primary" onclick="filterGallery('fitness')">Sports & Fitness</button>
        <button class="btn btn-outline-primary" onclick="filterGallery('academic')">Academic & Portfolio</button>
    </div>

    <div class="row g-4" id="galleryGrid">
        
        <div class="col-md-4 gallery-item base">
            <div class="img-card shadow" data-bs-toggle="modal" data-bs-target="#imgModal" onclick="updateModal('plane.jpg', 'Aviation Display')">
                <img src="plane.jpg" alt="Planes">
                <div class="img-label">Aviation Display</div>
            </div>
        </div>
        <div class="col-md-4 gallery-item base">
            <div class="img-card shadow" data-bs-toggle="modal" data-bs-target="#imgModal" onclick="updateModal('Hero.jpg', 'Base Entrance')">
                <img src="Hero.jpg" alt="Base View">
                <div class="img-label">Main Base View</div>
            </div>
        </div>
        <div class="col-md-4 gallery-item base">
            <div class="img-card shadow" data-bs-toggle="modal" data-bs-target="#imgModal" onclick="updateModal('Community.jpg', 'Community Hub')">
                <img src="Community.jpg" alt="Community">
                <div class="img-label">Community Spaces</div>
            </div>
        </div>

        <div class="col-md-4 gallery-item fitness">
            <div class="img-card shadow" data-bs-toggle="modal" data-bs-target="#imgModal" onclick="updateModal('taekwondo.jpg', 'Taekwondo Session')">
                <img src="taekwondo.jpg" alt="Taekwondo">
                <div class="img-label">Taekwondo</div>
            </div>
        </div>
        <div class="col-md-4 gallery-item fitness">
            <div class="img-card shadow" data-bs-toggle="modal" data-bs-target="#imgModal" onclick="updateModal('swimming.jpg', 'Aquatic Center')">
                <img src="swimming.jpg" alt="Swimming">
                <div class="img-label">Swimming</div>
            </div>
        </div>
        <div class="col-md-4 gallery-item fitness">
            <div class="img-card shadow" data-bs-toggle="modal" data-bs-target="#imgModal" onclick="updateModal('arnis.jpg', 'Arnis Training')">
                <img src="arnis.jpg" alt="Arnis">
                <div class="img-label">Arnis</div>
            </div>
        </div>
        <div class="col-md-4 gallery-item fitness">
            <div class="img-card shadow" data-bs-toggle="modal" data-bs-target="#imgModal" onclick="updateModal('gym.jpg', 'Fitness Center')">
                <img src="gym.jpg" alt="Gym">
                <div class="img-label">Gym & Weights</div>
            </div>
        </div>

        <div class="col-md-4 gallery-item academic">
            <div class="img-card shadow" data-bs-toggle="modal" data-bs-target="#imgModal" onclick="updateModal('slide1.jpg', 'Professional Profile')">
                <img src="slide1.jpg" alt="Profile">
                <div class="img-label">Group Photo</div>
            </div>
        </div>
        <div class="col-md-4 gallery-item academic">
            <div class="img-card shadow" data-bs-toggle="modal" data-bs-target="#imgModal" onclick="updateModal('slide2.jpg', 'Coursera Certification')">
                <img src="slide2.jpg" alt="Certification">
                <div class="img-label">Plane</div>
            </div>
        </div>
        <div class="col-md-4 gallery-item academic">
            <div class="img-card shadow" data-bs-toggle="modal" data-bs-target="#imgModal" onclick="updateModal('slide3.jpg', 'Scholar Research Artifact')">
                <img src="slide3.jpg" alt="Scholar Artifact">
                <div class="img-label">VYC christamas</div>
            </div>
        </div>

    </div>
</div>

<div class="modal fade" id="imgModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 bg-transparent">
            <div class="modal-body p-0 text-center">
                <img src="" id="modalImg" class="img-fluid rounded shadow-lg">
                <h5 id="modalCaption" class="text-white mt-3"></h5>
            </div>
        </div>
    </div>
</div>

<footer class="text-center">
    <div class="container">
        <p>Developer: Jethro T. Banastao | Site Collection</p>
    </div>
</footer>

<script>
    // Filtering Logic
    function filterGallery(category) {
        const items = document.querySelectorAll('.gallery-item');
        const buttons = document.querySelectorAll('.btn-outline-primary');
        
        // Update active button
        buttons.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        items.forEach(item => {
            if (category === 'all' || item.classList.contains(category)) {
                item.style.display = 'block';
            } else {
                item.style.display = 'none';
            }
        });
    }

    // Modal Update Logic
    function updateModal(src, caption) {
        document.getElementById('modalImg').src = src;
        document.getElementById('modalCaption').innerText = caption;
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
